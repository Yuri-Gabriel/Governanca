{% extends 'base.html' %}
{% block content %}
<section class="card">
  <div class="row-between">
    <h2>Banco de Questões</h2>
    <a class="btn btn-primary" href="{% url 'questao_create' %}">Nova questão</a>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr><th>ID</th><th>Categoria</th><th>Texto</th><th>Ativa</th></tr>
      </thead>
      <tbody>
        {% for q in questoes %}
        <tr>
          <td>{{ q.id }}</td>
          <td>{{ q.categoria.nome }}</td>
          <td>{{ q.texto }}</td>
          <td>{{ q.ativa|yesno:'Sim,Não' }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="4">Nenhuma questão cadastrada.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</section>
{% endblock %}
